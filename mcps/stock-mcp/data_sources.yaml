providers:
  sina:
    name: 新浪财经
    description: 新浪财经数据接口
    supports:
    - realtime
    - daily
    - index
    - futures
    - lhb
  eastmoney:
    name: 东方财富
    description: 东方财富数据接口
    supports:
    - realtime
    - sector
    - fund_flow
  ths:
    name: 同花顺
    description: 同花顺数据接口
    supports:
    - sector
    - research
  tencent:
    name: 腾讯财经
    description: 腾讯财经数据接口
    supports:
    - realtime
    - daily
  tdx:
    name: 通达信
    description: 通达信行情服务器，支持A股/港股/美股/期货实时行情、K线、技术指标
    supports:
    - realtime
    - daily
    - kline
    - tick
    - f10
    - indicator
    - futures
    - hk_stock
    - us_stock
sources:
  stock_daily:
    desc: A股日K线
    providers:
    - tencent
    - sina
    axdata:
      interface: stock_zh_a_hist_tx
      param_map:
        symbol: code
      symbol_fmt: tdx
    akshare:
      func: stock_zh_a_daily
      param_map: {}
      symbol_fmt: sina
      extra:
        adjust: qfq
  stock_realtime:
    desc: A股实时行情
    providers:
    - eastmoney
    - sina
    axdata: null
    akshare:
      func: stock_zh_a_spot_em
      fallback_func: stock_zh_a_spot
      param_map: {}
      symbol_fmt: null
      filter_by: 代码
      drop_params:
      - symbol
      - code
      sina_fallback: true
  index_daily:
    desc: A股指数日K线
    providers:
    - sina
    axdata: null
    akshare:
      func: stock_zh_index_daily
      param_map: {}
      symbol_fmt: sina
  index_realtime:
    desc: A股指数实时行情
    providers:
    - sina
    - eastmoney
    axdata:
      interface: stock_zh_index_spot_sina
      param_map: {}
      symbol_fmt: null
    akshare:
      func: stock_zh_index_spot_em
      param_map: {}
      symbol_fmt: null
      drop_params:
      - symbol
      - code
      sina_fallback: true
  etf_daily:
    desc: ETF日K线
    providers:
    - sina
    axdata:
      interface: fund_etf_hist_sina
      param_map: {}
      symbol_fmt: sina
    akshare:
      func: fund_etf_hist_sina
      param_map: {}
      symbol_fmt: sina
  etf_realtime:
    desc: ETF实时行情
    providers:
    - eastmoney
    axdata: null
    akshare:
      func: fund_etf_spot_em
      param_map: {}
      symbol_fmt: null
      filter_by: 代码
      drop_params:
      - symbol
      - code
      sina_fallback: true
  limit_up_pool:
    desc: 涨停池
