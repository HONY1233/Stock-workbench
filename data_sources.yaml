# 数据源配置文件
# 修改此文件即可增删数据源，无需改代码
# 每个源支持: axdata(优先) + akshare(fallback) 双源路由

sources:
  # ===== 个股 =====
  stock_daily:
    desc: "A股日K线"
    axdata:
      interface: stock_zh_a_hist_tx
      param_map:
        symbol: code
      symbol_fmt: tdx
    akshare:
      func: stock_zh_a_daily
      param_map: {}
      symbol_fmt: sina
      extra:
        adjust: qfq

  stock_realtime:
    desc: "A股实时行情"
    axdata: null
    akshare:
      func: stock_zh_a_spot_em
      param_map: {}
      symbol_fmt: null
      filter_by: 代码
      drop_params: [symbol, code]
      sina_fallback: true

  # ===== 指数 =====
  index_daily:
    desc: "A股指数日K线"
