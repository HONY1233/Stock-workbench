# 数据源配置文件
# 修改此文件即可增删数据源，无需改代码
# 每个源支持: axdata(优先) + akshare(fallback) 双源路由
#
# 结构说明:
#   sources.<name>:
#     desc: 描述
#     axdata: 优先数据源（可为 null）
#       interface: axdata 接口名
#       param_map: 参数映射 (dict)
#       symbol_fmt: 代码格式 (tdx/sina/null)
#     akshare: 备用数据源（可为 null）
#       func: akshare 函数名
#       param_map: 参数映射 (dict)
#       symbol_fmt: 代码格式 (sina/null)
#       filter_by: 按列过滤 (可选)
#       drop_params: 丢弃参数列表 (可选)
#       sina_fallback: 是否回退 sina (可选 bool)
#       extra: 额外参数 (可选 dict)
#       translate_fields: 需翻译字段 (可选 list)
#   custom_sources: 由 sources/ 目录下自定义模块提供的工具列表

sources:
  # ===== 个股 =====
  stock_daily:
    desc: "A股日K线"
    axdata:
      interface: stock_zh_a_hist_tx
      param_map:
        symbol: code
      symbol_fmt: tdx
    akshare:
      func: stock_zh_a_daily
      param_map: {}
      symbol_fmt: sina
      extra:
        adjust: qfq

  stock_realtime:
    desc: "A股实时行情（支持单只或多只代码过滤）"
    axdata: null
    akshare:
      func: stock_zh_a_spot_em
      param_map: {}
      symbol_fmt: null
      filter_by: 代码
      drop_params: [symbol, code]
      sina_fallback: true

  # ===== 指数 =====
